<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MITR LAO SUGAR — Executive Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#eef3fa;--card:#fff;--p1:#0a5cba;--p2:#1976d2;--p3:#42a5f5;--p4:#90caf9;--p5:#bbdefb;--pD:#062f5e;--ok:#0d8f47;--okBg:rgba(13,143,71,.08);--warn:#b86e05;--warnBg:rgba(184,110,5,.08);--err:#b71c1c;--errBg:rgba(183,28,28,.08);--ora:#bf5010;--tx:#0f172a;--tx2:#334155;--dim:#64748b;--dim2:#94a3b8;--bdr:#dde4ef;--bdr2:#c7d2e0;--r:14px;--s1:0 1px 4px rgba(0,30,80,.05);--s2:0 6px 24px rgba(0,30,80,.08)}
body{font-family:'Noto Sans Thai','Inter',system-ui,sans-serif;color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;background:linear-gradient(180deg,#fff 0%,#eef4fb 15%,#dce8f5 40%,#c5d9ee 70%,#a8c8e4 100%);background-attachment:fixed}
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0a5cba 0%,#1565c0 30%,#1976d2 60%,#42a5f5 100%);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:1;transition:opacity .5s}
.login-overlay.hide{opacity:0;pointer-events:none}
.login-box{background:rgba(255,255,255,.12);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.2);border-radius:24px;padding:40px 36px;width:380px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center}
.login-box img{width:70px;height:70px;border-radius:16px;box-shadow:0 6px 20px rgba(0,0,0,.2);background:#fff;padding:4px;margin-bottom:16px}
.login-box h2{color:#fff;font-size:18px;font-weight:700;margin-bottom:4px}
.login-box p{color:rgba(255,255,255,.6);font-size:12px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:1.5px solid rgba(255,255,255,.25);border-radius:12px;background:rgba(255,255,255,.1);color:#fff;font-family:inherit;font-size:14px;font-weight:500;margin-bottom:12px;outline:none;transition:.2s}
.login-box input::placeholder{color:rgba(255,255,255,.4)}
.login-box input:focus{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.15)}
.login-btn{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#fff,#e3ecf6);color:var(--p1);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(0,0,0,.15);margin-top:4px}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.2)}
.login-err{color:#fca5a5;font-size:12px;margin-top:10px;min-height:18px;font-weight:500}
.hdr{background:linear-gradient(135deg,#0a5cba 0%,#1565c0 30%,#1976d2 60%,#42a5f5 100%);position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-100px;right:-60px;width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 60%);border-radius:50%}
.hdr-in{display:flex;align-items:center;gap:18px;padding:18px 28px;z-index:1;position:relative;flex-wrap:wrap}
.hdr img{width:54px;height:54px;border-radius:13px;box-shadow:0 4px 16px rgba(0,0,0,.2);background:#fff;padding:3px}
.hdr-t h1{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.3px;text-shadow:0 1px 4px rgba(0,0,0,.15)}
.hdr-t p{font-size:12px;color:rgba(255,255,255,.8);font-weight:500;margin-top:2px}
.hdr-b{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;align-items:center}
.bdg{background:rgba(255,255,255,.18);backdrop-filter:blur(12px);padding:8px 16px;border-radius:10px;text-align:center;border:1px solid rgba(255,255,255,.2)}
.bdg .lb{font-size:9px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.bdg .vl{font-size:16px;font-weight:800;color:#fff;margin-top:1px}
.bdg .vl.sm{font-size:11px;font-weight:600}
.logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;transition:.2s}
.logout-btn:hover{background:rgba(255,255,255,.3)}
.nav-bar{display:flex;align-items:center;gap:8px;padding:10px 28px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,20,60,.04);flex-wrap:wrap}
.tabs{display:flex;gap:4px;margin-right:auto;flex-wrap:wrap}
.tab-b{padding:8px 20px;border:none;background:transparent;color:var(--dim);font-family:inherit;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;transition:.2s}
.tab-b:hover{background:var(--p5);color:var(--p1)}
.tab-b.active{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;box-shadow:0 3px 12px rgba(10,92,186,.3)}
.dbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dbar select,.dbar input[type=date]{padding:7px 10px;border:1.5px solid var(--bdr2);border-radius:9px;font-family:inherit;font-size:11px;background:#fff;color:var(--tx);cursor:pointer;font-weight:500}
.dbar input[type=date]{width:135px}
.nb{width:34px;height:34px;border:1.5px solid var(--bdr2);border-radius:9px;background:#fff;cursor:pointer;font-size:14px;color:var(--p1);display:flex;align-items:center;justify-content:center;transition:.15s;font-weight:700}
.nb:hover{background:var(--p2);color:#fff;border-color:var(--p2)}
.nb:disabled{opacity:.2;cursor:default;background:#fff;color:var(--dim)}
.mode-toggle{display:flex;border:1.5px solid var(--bdr2);border-radius:9px;overflow:hidden}
.mode-toggle button{padding:6px 12px;border:none;background:#fff;color:var(--dim);font-family:inherit;font-size:10px;font-weight:600;cursor:pointer;transition:.2s}
.mode-toggle button.active{background:var(--p1);color:#fff}
.wrap{max-width:1360px;margin:0 auto;padding:20px 24px}
.tc{display:none}.tc.active{display:block}
.cd{background:var(--card);border-radius:var(--r);padding:18px 20px;box-shadow:var(--s1);border:1px solid var(--bdr);transition:.25s}
.cd:hover{box-shadow:var(--s2)}
.cd-t{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);font-weight:700;margin-bottom:10px}
.kv{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.5px}
.kv-s{font-size:21px}.kv-u{font-size:11px;font-weight:500;color:var(--dim)}
.kr{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.kt{font-size:9.5px;padding:3px 8px;border-radius:6px;font-weight:600}
.kt-b{background:rgba(10,92,186,.07);color:var(--p1)}.kt-y{background:var(--warnBg);color:var(--warn)}.kt-g{background:var(--okBg);color:var(--ok)}.kt-r{background:var(--errBg);color:var(--err)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.fr{display:flex;gap:16px;flex-wrap:wrap}.mb{margin-bottom:16px}
@media(max-width:1024px){.g4{grid-template-columns:1fr 1fr}.nav-bar{flex-direction:column;align-items:flex-start;gap:8px}}
@media(max-width:768px){.g2,.g3,.g4{grid-template-columns:1fr}}
@media(max-width:640px){
  .hdr-in{padding:12px 14px;gap:10px}.hdr img{width:40px;height:40px}.hdr-t h1{font-size:15px}.hdr-t p{font-size:10px}
  .hdr-b{gap:5px;margin-left:0;width:100%}.bdg{padding:5px 10px;flex:1;min-width:0}.bdg .lb{font-size:7.5px}.bdg .vl{font-size:13px}
  .nav-bar{padding:8px 14px;gap:6px}.tabs{width:100%;gap:2px}.tab-b{padding:6px 12px;font-size:11px}
  .dbar{width:100%}.dbar select,.dbar input[type=date]{flex:1;font-size:10px;padding:6px 6px}
  .wrap{padding:10px}.cd{padding:14px}.kv{font-size:22px}.kv-s{font-size:17px}
  .g2,.g3,.g4,.mb,.fr{gap:10px;margin-bottom:10px}.cw{height:180px}
  .tb{font-size:10.5px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tb thead,.tb tbody,.tb tr{display:table;width:100%;table-layout:fixed}
  .rmk{padding:12px 14px}.rmk p{font-size:10.5px}
  .ch-box .sv-btn{width:26px;height:26px;font-size:11px}.mode-toggle button{padding:5px 8px;font-size:9px}
}
.sec{display:flex;align-items:center;gap:10px;margin:28px 0 16px;padding-bottom:10px;border-bottom:2px solid var(--bdr)}
.sec-i{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.sec-t{font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.2px}.sec-l{flex:1;height:1px;background:var(--bdr)}
.tb{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
.tb thead th{background:linear-gradient(135deg,#f0f5fb,#e3ecf6);padding:10px 12px;text-align:right;font-weight:700;color:var(--p1);border-bottom:2px solid var(--p4);font-size:10px;text-transform:uppercase;letter-spacing:.8px}
.tb thead th:first-child{text-align:left;border-radius:10px 0 0 0}.tb thead th:last-child{border-radius:0 10px 0 0}
.tb td{padding:9px 12px;text-align:right;border-bottom:1px solid #f1f4f8;font-weight:500}
.tb td:first-child{text-align:left;color:var(--tx2);font-weight:600}.tb tr:hover{background:#f8fafd}.tb .v{color:var(--p1);font-weight:700}
.cw{position:relative;height:220px}.gw{display:flex;flex-direction:column;align-items:center;justify-content:center}
.rmk{background:linear-gradient(135deg,#fefce8,#fef9c3);border:1px solid #fde047;border-radius:var(--r);padding:16px 20px}
.rmk h4{font-size:12px;font-weight:700;color:var(--warn);margin-bottom:8px}.rmk p{font-size:11.5px;line-height:1.9;color:var(--tx2)}
.ch-box{position:relative}
.ch-box .sv-btn{position:absolute;top:0;right:0;width:28px;height:28px;border-radius:7px;border:1px solid var(--bdr);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.4;transition:.2s;z-index:5;font-size:13px;color:var(--p1)}
.ch-box .sv-btn:hover{opacity:1;background:var(--p5);box-shadow:0 2px 8px rgba(10,92,186,.15)}
.app-content{display:none}
</style>
</head>
