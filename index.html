<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MITR LAO SUGAR — Executive Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#eef3fa;--card:#fff;--p1:#0a5cba;--p2:#1976d2;--p3:#42a5f5;--p4:#90caf9;--p5:#bbdefb;--pD:#062f5e;--ok:#0d8f47;--okBg:rgba(13,143,71,.08);--warn:#b86e05;--warnBg:rgba(184,110,5,.08);--err:#b71c1c;--errBg:rgba(183,28,28,.08);--ora:#bf5010;--tx:#0f172a;--tx2:#334155;--dim:#64748b;--dim2:#94a3b8;--bdr:#dde4ef;--bdr2:#c7d2e0;--r:14px;--s1:0 1px 4px rgba(0,30,80,.05);--s2:0 6px 24px rgba(0,30,80,.08)}
body{font-family:'Noto Sans Thai','Inter',system-ui,sans-serif;color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;background:linear-gradient(180deg,#fff 0%,#eef4fb 15%,#dce8f5 40%,#c5d9ee 70%,#a8c8e4 100%);background-attachment:fixed}
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0a5cba 0%,#1565c0 30%,#1976d2 60%,#42a5f5 100%);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:1;transition:opacity .5s}
.login-overlay.hide{opacity:0;pointer-events:none}
.login-box{background:rgba(255,255,255,.12);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.2);border-radius:24px;padding:40px 36px;width:380px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center}
.login-box img{width:70px;height:70px;border-radius:16px;box-shadow:0 6px 20px rgba(0,0,0,.2);background:#fff;padding:4px;margin-bottom:16px}
.login-box h2{color:#fff;font-size:18px;font-weight:700;margin-bottom:4px}
.login-box p{color:rgba(255,255,255,.6);font-size:12px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:1.5px solid rgba(255,255,255,.25);border-radius:12px;background:rgba(255,255,255,.1);color:#fff;font-family:inherit;font-size:14px;font-weight:500;margin-bottom:12px;outline:none;transition:.2s}
.login-box input::placeholder{color:rgba(255,255,255,.4)}
.login-box input:focus{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.15)}
.login-btn{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#fff,#e3ecf6);color:var(--p1);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(0,0,0,.15);margin-top:4px}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.2)}
.login-err{color:#fca5a5;font-size:12px;margin-top:10px;min-height:18px;font-weight:500}
.hdr{background:linear-gradient(135deg,#0a5cba 0%,#1565c0 30%,#1976d2 60%,#42a5f5 100%);position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-100px;right:-60px;width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 60%);border-radius:50%}
.hdr-in{display:flex;align-items:center;gap:18px;padding:18px 28px;z-index:1;position:relative;flex-wrap:wrap}
.hdr img{width:54px;height:54px;border-radius:13px;box-shadow:0 4px 16px rgba(0,0,0,.2);background:#fff;padding:3px}
.hdr-t h1{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.3px;text-shadow:0 1px 4px rgba(0,0,0,.15)}
.hdr-t p{font-size:12px;color:rgba(255,255,255,.8);font-weight:500;margin-top:2px}
.hdr-b{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;align-items:center}
.bdg{background:rgba(255,255,255,.18);backdrop-filter:blur(12px);padding:8px 16px;border-radius:10px;text-align:center;border:1px solid rgba(255,255,255,.2)}
.bdg .lb{font-size:9px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.bdg .vl{font-size:16px;font-weight:800;color:#fff;margin-top:1px}
.bdg .vl.sm{font-size:11px;font-weight:600}
.logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;transition:.2s}
.logout-btn:hover{background:rgba(255,255,255,.3)}
.nav-bar{display:flex;align-items:center;gap:8px;padding:10px 28px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,20,60,.04);flex-wrap:wrap}
.tabs{display:flex;gap:4px;margin-right:auto;flex-wrap:wrap}
.tab-b{padding:8px 16px;border:none;background:transparent;color:var(--dim);font-family:inherit;font-size:11px;font-weight:600;border-radius:8px;cursor:pointer;transition:.2s}
.tab-b:hover{background:var(--p5);color:var(--p1)}
.tab-b.active{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;box-shadow:0 3px 12px rgba(10,92,186,.3)}
.dbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dbar select,.dbar input[type=date]{padding:7px 10px;border:1.5px solid var(--bdr2);border-radius:9px;font-family:inherit;font-size:11px;background:#fff;color:var(--tx);cursor:pointer;font-weight:500}
.dbar input[type=date]{width:135px}
.nb{width:34px;height:34px;border:1.5px solid var(--bdr2);border-radius:9px;background:#fff;cursor:pointer;font-size:14px;color:var(--p1);display:flex;align-items:center;justify-content:center;transition:.15s;font-weight:700}
.nb:hover{background:var(--p2);color:#fff;border-color:var(--p2)}.nb:disabled{opacity:.2;cursor:default;background:#fff}
.mode-toggle{display:flex;border:1.5px solid var(--bdr2);border-radius:9px;overflow:hidden}
.mode-toggle button{padding:6px 12px;border:none;background:#fff;color:var(--dim);font-family:inherit;font-size:10px;font-weight:600;cursor:pointer;transition:.2s}
.mode-toggle button.active{background:var(--p1);color:#fff}
.wrap{max-width:1360px;margin:0 auto;padding:20px 24px}
.tc{display:none}.tc.active{display:block}
.cd{background:var(--card);border-radius:var(--r);padding:18px 20px;box-shadow:var(--s1);border:1px solid var(--bdr);transition:.25s}.cd:hover{box-shadow:var(--s2)}
.cd-t{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);font-weight:700;margin-bottom:10px}
.kv{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.5px}.kv-s{font-size:21px}.kv-u{font-size:11px;font-weight:500;color:var(--dim)}
.kr{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.kt{font-size:9.5px;padding:3px 8px;border-radius:6px;font-weight:600}
.kt-b{background:rgba(10,92,186,.07);color:var(--p1)}.kt-y{background:var(--warnBg);color:var(--warn)}.kt-g{background:var(--okBg);color:var(--ok)}.kt-r{background:var(--errBg);color:var(--err)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.fr{display:flex;gap:16px;flex-wrap:wrap}.mb{margin-bottom:16px}
@media(max-width:1024px){.g4{grid-template-columns:1fr 1fr}[style*='grid-template-columns:repeat(5']{grid-template-columns:repeat(3,1fr)}.nav-bar{flex-direction:column;align-items:flex-start;gap:8px}}
@media(max-width:768px){.g2,.g3,.g4,[style*='grid-template-columns:repeat(5']{grid-template-columns:1fr}}
@media(max-width:640px){.hdr-in{padding:12px 14px;gap:10px}.hdr img{width:40px;height:40px}.hdr-t h1{font-size:15px}.hdr-t p{font-size:10px}.hdr-b{gap:5px;margin-left:0;width:100%}.bdg{padding:5px 10px;flex:1;min-width:0}.bdg .lb{font-size:7.5px}.bdg .vl{font-size:13px}.nav-bar{padding:8px 14px;gap:6px}.tabs{width:100%;gap:2px}.tab-b{padding:6px 10px;font-size:10px}.dbar{width:100%}.dbar select,.dbar input[type=date]{flex:1;font-size:10px;padding:6px 6px}.wrap{padding:10px}.cd{padding:14px}.kv{font-size:22px}.kv-s{font-size:17px}.g2,.g3,.g4,.mb,.fr{gap:10px;margin-bottom:10px}.cw{height:180px}.tb{font-size:10.5px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}.tb thead,.tb tbody,.tb tr{display:table;width:100%;table-layout:fixed}.rmk{padding:12px 14px}.rmk p{font-size:10.5px}.ch-box .sv-btn{width:26px;height:26px;font-size:11px}.mode-toggle button{padding:5px 8px;font-size:9px}}
.sec{display:flex;align-items:center;gap:10px;margin:28px 0 16px;padding-bottom:10px;border-bottom:2px solid var(--bdr)}
.sec-i{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}.sec-t{font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.2px}.sec-l{flex:1;height:1px;background:var(--bdr)}
.tb{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
.tb thead th{background:linear-gradient(135deg,#f0f5fb,#e3ecf6);padding:10px 12px;text-align:right;font-weight:700;color:var(--p1);border-bottom:2px solid var(--p4);font-size:10px;text-transform:uppercase;letter-spacing:.8px}
.tb thead th:first-child{text-align:left;border-radius:10px 0 0 0}.tb thead th:last-child{border-radius:0 10px 0 0}
.tb td{padding:9px 12px;text-align:right;border-bottom:1px solid #f1f4f8;font-weight:500}.tb td:first-child{text-align:left;color:var(--tx2);font-weight:600}.tb tr:hover{background:#f8fafd}.tb .v{color:var(--p1);font-weight:700}
.cw{position:relative;height:220px}.gw{display:flex;flex-direction:column;align-items:center;justify-content:center}
.rmk{background:linear-gradient(135deg,#fefce8,#fef9c3);border:1px solid #fde047;border-radius:var(--r);padding:16px 20px}
.rmk h4{font-size:12px;font-weight:700;color:var(--warn);margin-bottom:8px}.rmk p{font-size:11.5px;line-height:1.9;color:var(--tx2)}
.ch-box{position:relative}.ch-box .sv-btn{position:absolute;top:0;right:0;width:28px;height:28px;border-radius:7px;border:1px solid var(--bdr);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.4;transition:.2s;z-index:5;font-size:13px;color:var(--p1)}.ch-box .sv-btn:hover{opacity:1;background:var(--p5)}
.app-content{display:none}
/* Collapsible */
.coll-btn{background:none;border:none;cursor:pointer;color:var(--p1);font-weight:700;font-size:12px;display:flex;align-items:center;gap:4px;padding:4px 0}
.coll-btn::before{content:'▶';font-size:9px;transition:transform .2s;display:inline-block}
.coll-btn.open::before{transform:rotate(90deg)}
.coll-body{display:none;padding-left:16px}.coll-body.open{display:block}
/* Stop table colors */
.stop-row-green{background:rgba(13,143,71,.06)}.stop-row-green td:first-child{color:var(--ok)}
.stop-row-red{background:rgba(183,28,28,.04)}.stop-row-red td:first-child{color:var(--err)}

.sum-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9000;align-items:center;justify-content:center}
.sum-overlay.show{display:flex}
.sum-box{background:#fff;border-radius:18px;padding:28px 24px;max-width:520px;width:92vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);position:relative}
.sum-box h3{font-size:15px;font-weight:800;color:var(--p1);margin-bottom:14px;text-align:center}
.sum-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f1f4f8;font-size:12px}
.sum-row .sl{color:var(--tx2);font-weight:500}.sum-row .sv{font-weight:700;color:var(--p1)}
.sum-stars{text-align:center;margin:14px 0 6px;font-size:22px}
.sum-comment{text-align:center;font-size:11.5px;color:var(--tx2);line-height:1.7;padding:8px 12px;background:#f8fafd;border-radius:10px;margin-top:8px}
.sum-btns{display:flex;gap:8px;margin-top:14px;justify-content:center}
.sum-btns button{padding:8px 18px;border-radius:10px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:.2s}
.sum-save{background:var(--p1);color:#fff}.sum-save:hover{background:var(--pD)}
.sum-close{background:#f1f4f8;color:var(--tx2)}.sum-close:hover{background:#e2e8f0}
.sum-x{position:absolute;top:12px;right:14px;background:none;border:none;font-size:18px;color:var(--dim);cursor:pointer}

.scroll-top{position:fixed;bottom:16px;right:16px;width:40px;height:40px;border-radius:50%;background:var(--p1);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 16px rgba(10,92,186,.3);z-index:50;transition:.2s}
.scroll-top:hover{background:var(--pD);transform:translateY(-2px)}
.scroll-top.show{display:flex}
.ex-btn{position:absolute;top:0;right:32px;width:28px;height:28px;border-radius:7px;border:1px solid var(--bdr);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.4;transition:.2s;z-index:5;font-size:11px;color:var(--ok)}.ex-btn:hover{opacity:1;background:#f0fdf4}

.season-btn{font-size:10px !important;padding:7px 14px !important;transition:.2s;border-radius:8px !important;font-weight:700 !important}
.season-btn.active{color:#fff !important;box-shadow:0 3px 12px rgba(0,0,0,.2)}

body.green-theme{--p1:#0d7c3e;--p2:#16a34a;--p3:#22c55e;--p4:#86efac;--p5:#dcfce7;--pD:#064e2b}
body.green-theme .hdr{background:linear-gradient(135deg,#064e2b 0%,#0d7c3e 30%,#16a34a 60%,#22c55e 100%)}
body.green-theme .hdr::before{background:radial-gradient(circle,rgba(255,255,255,.1),transparent 60%)}
body.green-theme .tab-b.active{background:linear-gradient(135deg,#0d7c3e,#16a34a);box-shadow:0 3px 12px rgba(13,124,62,.3)}
body.green-theme .tab-b:hover{background:var(--p5);color:var(--p1)}
body.green-theme .nb:hover{background:var(--p2);border-color:var(--p2)}
body.green-theme .mode-toggle button.active{background:var(--p1)}
body.green-theme .login-overlay{background:linear-gradient(135deg,#064e2b 0%,#0d7c3e 30%,#16a34a 60%,#22c55e 100%)}

#compOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg,#FAFAFF);z-index:10000;overflow-y:auto}
#compOverlay.show{display:block}
.comp-back{position:fixed;top:16px;right:20px;z-index:10001;background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.3);transition:.2s}
.comp-back:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.4)}

#compOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:10000;background:#FAFAFF;-webkit-overflow-scrolling:touch}
#compOverlay.show{display:block}
#compFrame{width:100%;height:100%;border:none}
.comp-back{position:fixed;top:12px;right:12px;z-index:10001;background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:#fff;border:none;padding:8px 16px;border-radius:10px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.3);transition:.2s;display:none}
@media(max-width:768px){.comp-back{top:8px;right:8px;padding:7px 12px;font-size:10px;border-radius:8px}}
.comp-back:hover{transform:translateY(-2px)}
#compOverlay.show+.comp-back,#compOverlay.show~.comp-back{display:block}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .hdr{padding:12px 14px}
  .hdr-t h1{font-size:14px}
  .hdr-t p,.hdr-sub{font-size:9px}
  .hdr-logo{width:36px;height:36px;border-radius:8px}
  .hdr-b{gap:4px}
  .bdg{padding:5px 8px;font-size:9px;min-width:auto}
  .bdg .vl{font-size:12px !important}
  .bdg .lb{font-size:8px}
  .logout-btn{padding:5px 8px;font-size:9px}
  .tabs{gap:3px;padding:0 8px;flex-wrap:wrap}
  .tab-b{padding:7px 10px !important;font-size:10px !important}
  .fr{flex-direction:column}
  .g2,.g3{grid-template-columns:1fr !important}
  [style*='grid-template-columns:repeat(5']{grid-template-columns:repeat(2,1fr) !important}
  [style*='grid-template-columns:repeat(3']{grid-template-columns:1fr !important}
  .cd{padding:14px 12px}
  .kv{font-size:22px}
  .kv-s{font-size:16px}
  .cd-t{font-size:11px}
  .sec{margin-bottom:12px}
  .sec-t{font-size:12px}
  table{font-size:10px}
  table th,table td{padding:6px 8px}
  .sum-box{padding:18px 14px;max-width:98vw}
  .sum-row .sl{font-size:10px}
  .sum-row .sv{font-size:11px}
  .sum-comment{font-size:10px !important}
  .ch-box{min-height:180px}
  .cw{height:180px}
  .scroll-top{width:36px;height:36px;font-size:16px;bottom:10px;right:10px}
}
@media(max-width:480px){
  .hdr-b{flex-direction:row;flex-wrap:wrap;justify-content:center}
  .bdg{flex:0 0 auto}
  [style*='grid-template-columns:repeat(5']{grid-template-columns:1fr !important}
  .kv{font-size:20px}
  .tabs{justify-content:center}
  .tab-b{font-size:9px !important;padding:6px 8px !important}
}

.upload-panel{display:none;background:linear-gradient(135deg,#faf5ff,#f3e8ff);border:2px dashed #c4b5fd;border-radius:14px;padding:20px;margin-bottom:16px;text-align:center}
.upload-panel.show{display:block}
.upload-row{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.upload-row label{font-size:11px;font-weight:600;color:#6d28d9;min-width:100px;text-align:right}
.upload-btn{background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:#fff;border:none;padding:10px 28px;border-radius:10px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.upload-btn:disabled{opacity:.5;cursor:not-allowed}
.upload-status{font-size:11px;margin-top:8px;padding:6px 12px;border-radius:8px;display:none}
.upload-status.ok{display:block;background:#dcfce7;color:#166534}
.upload-status.err{display:block;background:#fef2f2;color:#991b1b}
.upload-status.loading{display:block;background:#eff6ff;color:#1e40af}
</style>

<body>

  mc('e_surplus','line',lb,[{label:'Today',data:S.map(r=>(!r.fb_surp_t||r.fb_surp_t<0||WASH_23.has(r.d))?null:r.fb_surp_t),borderColor:'#7c3aed',backgroundColor:'#7c3aed15',fill:true,borderWidth:2.5,pointRadius:0,tension:.4,borderCapStyle:'round'},{label:'To-Date',data:S.map(r=>r.fb_surp_d),borderColor:'#0891b2',backgroundColor:'#0891b210',fill:false,borderWidth:2,pointRadius:0,tension:.4,borderDash:[6,3]},rL('Target 1.37',1.37,'#16a34a',n)]);
  mc('e_nkwh','line',lb,[{label:'Today',data:S.map(r=>(!r.enc_t||r.enc_t===0||WASH_23.has(r.d)||(currentSeason==='2425'&&(r.d==='2025-03-04'||r.d==='2025-01-07'||r.d==='2025-03-05')))?null:r.enc_t),borderColor:'#ea580c',backgroundColor:'#ea580c15',fill:true,borderWidth:2.5,pointRadius:0,tension:.4},{label:'To-Date',data:S.map(r=>r.enc_d),borderColor:'#2563eb',fill:false,borderWidth:2,pointRadius:0,tension:.4,borderDash:[6,3]},rL('Target 32',32,'#16a34a',n)]);

  // Stoptime charts
  const stLb=SS.map(r=>sd(r.d));
  mc('st_hc','bar',stLb,[br('Crushing Hrs',SS.map(r=>r.hc_t),P.b)]);
  mc('st_ote','line',stLb,[{label:'OTE Today',data:SS.map(r=>(getWashDays().has(r.d)||!r.ote_t||r.ote_t===0)?null:r.ote_t),borderColor:'#16a34a',backgroundColor:'#16a34a15',fill:true,borderWidth:2.5,pointRadius:0,tension:.4},{label:'OTE To-Date',data:SS.map(r=>r.ote_d),borderColor:'#0891b2',fill:false,borderWidth:2,pointRadius:0,tension:.4,borderDash:[6,3]},rL('Target 93.97',93.97,'#f59e0b',SS.length)]);
  mc('st_me','line',stLb,[{label:'ME Today',data:SS.map(r=>(getWashDays().has(r.d)||!r.me_t||r.me_t===0)?null:r.me_t),borderColor:'#e11d48',backgroundColor:'#e11d4815',fill:true,borderWidth:2.5,pointRadius:0,tension:.4},{label:'ME To-Date',data:SS.map(r=>r.me_d),borderColor:'#0891b2',fill:false,borderWidth:2,pointRadius:0,tension:.4,borderDash:[6,3]},rL('Target 98.67',98.67,'#16a34a',SS.length)]);
  mc('st_cat','line',stLb,[
    ln('Mech/Elec',SS.map(r=>r.tm_t),'#dc2626'),
    ln('Boiling House',SS.map(r=>r.tb_t),'#f59e0b'),
    ln('Other',SS.map(r=>r.to_t),'#6366f1')
  ]);
  // Pie chart for to-date breakdown
  const pieEl=document.getElementById('st_pie');
  if(pieEl){
    if(chs['st_pie'])chs['st_pie'].destroy();
    // คำนวณ No Cane (ด้านอ้อย) จาก srmk ของทุกวันใน S
    let noCane_d=0;
    S.forEach(function(r){if(r.srmk&&r.srmk.length)r.srmk.forEach(function(rm){if(rm.dept&&rm.dept.includes('อ้อย'))noCane_d+=rm.dur_hr||0})});
    noCane_d=Math.round(noCane_d*100)/100;
    const pieTotal=(stR.tm_d||0)+(stR.tb_d||0)+(stR.to_d||0)+noCane_d;
    if(pieTotal<=0){
      const ctx=pieEl.getContext('2d');ctx.clearRect(0,0,pieEl.width,pieEl.height);
      ctx.font='12px Noto Sans Thai';ctx.fillStyle='#94a3b8';ctx.textAlign='center';ctx.fillText('ไม่มีข้อมูลการหยุดหีบ',pieEl.width/2,pieEl.height/2);
    } else {
    chs['st_pie']=new Chart(pieEl,{type:'doughnut',
      data:{labels:['Mech/Elec','Boiling House','Other','รออ้อย (ด้านอ้อย)'],
        datasets:[{data:[stR.tm_d||0,stR.tb_d||0,stR.to_d||0,noCane_d],backgroundColor:['#dc262690','#f59e0b90','#6366f190','#22c55e90'],borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
        plugins:{legend:{position:'bottom',labels:{font:{size:10,family:'Noto Sans Thai'},padding:12,generateLabels:function(chart){
          const d=chart.data;return d.labels.map((l,i)=>{const v=d.datasets[0].data[i];const pct=pieTotal>0?(v/pieTotal*100).toFixed(1):'0';return{text:`${l}: ${v.toFixed(1)}h (${pct}%)`,fillStyle:d.datasets[0].backgroundColor[i],index:i}})}}},
          tooltip:{callbacks:{label:function(ctx){const v=ctx.raw;const pct=pieTotal>0?(v/pieTotal*100).toFixed(1):'0';return `${ctx.label}: ${v.toFixed(2)} hrs (${pct}%)`}}}
        }
      },
      plugins:[{id:'centerText',afterDraw:function(chart){const{ctx:c,chartArea:{width:w,height:h,top:t,left:l}}=chart;c.save();c.font='800 22px Inter';c.fillStyle='#0f172a';c.textAlign='center';c.fillText(pieTotal.toFixed(1),l+w/2,t+h/2-4);c.font='500 10px Noto Sans Thai';c.fillStyle='#64748b';c.fillText('ชม. รวม',l+w/2,t+h/2+14);c.restore()}}]
    });
    }
  }
}

function showSummary(){
  if(mode==='range')return alert('กรุณาเลือกโหมด "วันเดียว" เพื่อดูสรุปรายวัน');
  const L=D[ix];
  const isWashDay=getWashDays().has(L.d)||(L.ct===0||L.ct==='0');
  const CAP=currentSeason==='2425'?6000:8000; // Mill Capacity: 2024/25=6,000, 2025/26=8,000 TC/day

  // Extract values
  const ct=typeof L.ct==='number'?L.ct:0;
  const ccs=typeof L.st==='number'?L.st:0, sx=typeof L.sx==='number'?L.sx:13.85;
  const pur=typeof L.pur_t==='number'?L.pur_t:0;
  const me=typeof L.met==='number'?L.met:0;
  const bt=typeof L.bt==='number'?L.bt:0;
  const tl=typeof L.tlt==='number'?L.tlt:0;
  const ccsR=typeof L.trt==='number'?L.trt:0;
  const steam=typeof L.ast==='number'?L.ast:0;
  const yv=typeof L.yt==='number'?L.yt:0;
  const yieldKg=yv>0?(yv*10).toFixed(1)+' kg/TC':'-';
  const capUtil=ct>0?(ct/CAP*100):0;
  const stopCount=L.srmk?L.srmk.length:0;
  const stopList=stopCount>0?L.srmk.map(s=>'• '+s.dept+': '+s.cause+' ('+s.dur_min+' นาที)').join('<br>'):'ไม่มีการหยุดหีบ ✅';
  const totalStopMin=stopCount>0?L.srmk.reduce((a,s)=>a+s.dur_min,0):0;
  const totalStopHr=totalStopMin/60;

  // Color function
  function vc(val,tgt,lowerBetter){
    if(val===0||!tgt)return'var(--p1)';
    const diff=lowerBetter?(val-tgt):(tgt-val);
    const pct=tgt!==0?Math.abs(diff)/Math.abs(tgt)*100:0;
    if(diff<=0)return'#0d8f47';if(pct<5)return'#1976d2';if(pct<15)return'#f59e0b';return'#dc2626';
  }

  // ========== EXPERT SCORING 10/10 ==========
  let score=10, issues=[], rootCauses=[], tips=[];

  // --- 1. CCS (2.0 pts max deduction) - THE most critical KPI ---
  if(ccs>0&&ccs<sx){
    const gap=sx-ccs;
    if(gap>2){score-=2;issues.push('CCS ต่ำมาก ('+f2(ccs)+' vs เป้า '+sx+') — สูญเสีย Recoverable Sugar รุนแรง ส่งผลต่อ Yield โดยตรง')}
    else if(gap>1){score-=1;issues.push('CCS ต่ำกว่าเป้า ('+f2(ccs)+' vs '+sx+') — Pol/Brix ratio ไม่ดี ตรวจสอบคุณภาพอ้อยและ Inversion')}
    else{score-=0.5;issues.push('CCS ใกล้เป้าแต่ยังไม่ถึง ('+f2(ccs)+')');}
  }

  // --- 2. Burnt Cane (1.5 pts) - Chain effect destroyer ---
  if(bt>3){
    if(bt>15){score-=1.5;issues.push('อ้อยไฟไหม้วิกฤต ('+f2(bt)+'%) — Dextran พุ่งสูง ทำให้ความหนืดน้ำอ้อยเพิ่ม, Sucrose Inversion รุนแรง, สี (ICUMSA Colour) เสียหาย, การกรองและการตกผลึกมีปัญหา')}
    else if(bt>8){score-=1;issues.push('อ้อยไฟไหม้สูง ('+f2(bt)+'%) — ส่งผลต่อ Apparent Purity, เพิ่ม Non-sugars, ลด Extraction Efficiency')}
    else{score-=0.5;issues.push('อ้อยไฟไหม้เกินเป้า ('+f2(bt)+'% vs <3%) — เริ่มส่งผลต่อ Pol ในกาก')}
  }

  // --- 3. Purity of First Juice (1.0 pt) ---
  if(pur>0&&pur<85){
    if(pur<80){score-=1;issues.push('Purity of First Juice ต่ำมาก ('+f2(pur)+'%) — บ่งชี้ว่า Non-sugars สูง อาจเกิดจากอ้อยค้างไร่ (Stale Cane), Dextran, หรือดินปน')}
    else{score-=0.5;issues.push('Purity of First Juice ต่ำ ('+f2(pur)+'% vs 85%) — ตรวจสอบ Trash %, อ้อยไฟไหม้, และอายุอ้อยหลังตัด')}
  }

  // --- 4. Total Loss (1.0 pt) ---
  if(tl>16.54){
    if(tl>25){score-=1;issues.push('Total Loss สูงมาก ('+f2(tl)+'%) — Mass Balance ชี้ว่ามี Undetermined Loss สูง ตรวจสอบระบบ Weighing, การรั่วไหล, และ Sucrose Degradation ในหม้อระเหย')}
    else if(tl>20){score-=0.5;issues.push('Total Loss สูง ('+f2(tl)+'%) — ตรวจสอบ Loss in Final Molasses (Purity) และ Loss in Bagasse (Pol in Bagasse)')}
    else{score-=0.5;issues.push('Total Loss เกินเป้าเล็กน้อย ('+f2(tl)+'% vs 16.54%)')}
  }

  // --- 5. ME (1.0 pt) ---
  if(me>0&&me<98.67){
    if(me<80){score-=1;issues.push('M.E. ต่ำมาก ('+f2(me)+'%) — เครื่องจักรหยุดนาน กระทบ Continuous Process, Steam Balance เสียสมดุล, อ้อยค้างรอหีบนานขึ้น')}
    else if(me<93){score-=0.5;issues.push('M.E. ต่ำ ('+f2(me)+'%) — หยุดเครื่องกระทบ Throughput และทำให้ Steam ต่อตันอ้อยสูงขึ้น')}
    else{score-=0.5;issues.push('M.E. ยังไม่ถึงเป้า ('+f2(me)+'% vs 98.67%)')}
  }

  // --- 6. % CCS Recovery (1.0 pt) ---
  if(ccsR>0&&ccsR<93){
    if(ccsR<80){score-=1;issues.push('% CCS Recovery ต่ำมาก ('+f2(ccsR)+'%) — Sugar Loss รุนแรงใน Crystallization/Centrifugal — ตรวจสอบ Supersaturation Control และ Molasses Exhaustion')}
    else if(ccsR<87){score-=0.5;issues.push('% CCS Recovery ต่ำ ('+f2(ccsR)+'%) — ตรวจสอบระบบ Boiling Scheme และ Purity of Final Molasses')}
    else{score-=0.5;issues.push('% CCS Recovery ยังไม่ถึงเป้า ('+f2(ccsR)+'% vs 93%)')}
  }

  // --- 7. Steam (1.0 pt) ---
  if(steam>0&&steam>450){
    if(steam>600){score-=1;issues.push('Steam สูงมาก ('+f2(steam)+' Kg/TC) — ระบบ Thermal Economy มีปัญหารุนแรง ตรวจสอบ Evaporator Scaling, Vapor Bleeding Configuration, และ Condensate Recovery')}
    else if(steam>500){score-=0.5;issues.push('Steam สูง ('+f2(steam)+' Kg/TC) — อาจเกิดจาก Evaporator ทำงานไม่เต็มประสิทธิภาพ หรือ Steam Trap รั่ว')}
    else{score-=0.5;issues.push('Steam เกินเป้าเล็กน้อย ('+f2(steam)+' vs 450 Kg/TC)')}
  }

  // --- 8. Capacity Utilization (0.5 pt) ---
  if(ct>0&&ct<CAP*0.7){
    score-=0.5;
    const tch=ct/24;
    issues.push('หีบอ้อยได้ '+fI(ct)+' ตัน ('+f2(capUtil)+'% ของ Capacity '+fI(CAP)+' ตัน/วัน, TCH='+f2(tch)+') — ไม่เต็มกำลังผลิต ทำให้ต้นทุนต่อตันอ้อยสูงขึ้น');
  }

  // --- 9. Stoppage (0.5 pt) ---
  if(totalStopMin>120){score-=0.5;issues.push('หยุดหีบรวม '+totalStopMin+' นาที ('+f2(totalStopHr)+' ชม., '+stopCount+' ครั้ง) — หยุด-เดินซ้ำทำให้ Steam Consumption สูงจากการ Warm-up')}

  score=Math.max(0,Math.min(10,Math.round(score*2)/2));

  // ========== ROOT CAUSE ANALYSIS (Expert Sugar Tech + Mech Eng) ==========

  // Chain Effect: Burnt Cane
  if(bt>5){
    let chain='🔗 <b>ผลกระทบลูกโซ่จากอ้อยไฟไหม้ '+f2(bt)+'%:</b><br>';
    chain+='อ้อยเผา → แบคทีเรีย Leuconostoc สร้าง <b>Dextran</b> → ความหนืดน้ำอ้อยเพิ่ม → ';
    chain+='การกรองใน Clarifier ช้าลง → Mud ไม่แยกดี → ';
    chain+='<b>Sucrose Inversion</b> จากกรดที่เพิ่ม (pH ต่ำ + อุณหภูมิ) → ';
    chain+='Pol ลด, Brix คงที่ → <b>Purity ตก</b> → CCS ลด → Recovery ลด';
    if(pur<85) chain+='<br>📊 ยืนยัน: Purity วันนี้ '+f2(pur)+'% (ต่ำกว่า 85%) สอดคล้องกับผลกระทบข้างต้น';
    rootCauses.push(chain);
    tips.push('💡 <b>ลดอ้อยไฟไหม้เป็นอันดับแรก</b> — ตาม Hugot ทุก 1% Trash ที่ลด จะเพิ่ม Recoverable Sugar ~0.2% และลด ICUMSA Colour ~50 units');
  }

  // Capacity Analysis
  if(ct>0){
    const tch=ct/24;
    const designTCH=CAP/24; // ~333 TCH
    if(tch<designTCH*0.7&&me>90){
      rootCauses.push('🏭 <b>Capacity Utilization ต่ำ ('+f2(capUtil)+'%)</b>: โรงงานมี Design Capacity '+fI(CAP)+' ตัน/วัน (TCH ≈'+f2(designTCH)+') แต่หีบได้เพียง TCH='+f2(tch)+'<br>เมื่อ M.E.='+f2(me)+'% (เครื่องจักรพร้อม) แสดงว่าปัญหาอยู่ที่ <b>ปริมาณอ้อยเข้าโรงงาน (Cane Supply)</b> ไม่ใช่เครื่องจักร<br>ผลกระทบ: Specific Steam Consumption สูง ('+f2(steam)+' Kg/TC) เพราะ Fixed Heat Loss ถูกหารด้วยอ้อยน้อย, ต้นทุนผลิตต่อตันสูง');
      tips.push('💡 <b>เพิ่ม Cane Supply</b> ให้ใกล้ '+fI(CAP)+' ตัน — จะช่วยลด Steam/TC และเพิ่ม Cogeneration Revenue');
    }
    if(tch<designTCH*0.7&&me<85){
      rootCauses.push('🏭 <b>Throughput ต่ำจากเครื่องจักร</b>: TCH='+f2(tch)+' (Capacity '+f2(designTCH)+' TCH) ร่วมกับ M.E.='+f2(me)+'%<br>สาเหตุที่เป็นไปได้: (1) Hydraulic System ของลูกหีบรั่ว/แรงดันต่ำ → Roller Rise ผิดปกติ (2) Cane Preparation Index (PI) ต่ำ → อ้อยไม่แตกดี → Feed Rate ลด (3) Turbine/Motor drive มีปัญหา');
      tips.push('💡 <b>ตรวจสอบ Hydraulic Pressure</b> ของลูกหีบทุกชุด และ Amperage ของ Drive Motor — หากไม่ถึง Full Load แสดงว่าป้อนอ้อยไม่เต็ม');
    }
    if(ct>=CAP*0.95){
      tips.push('💡 กำลังผลิตใกล้เต็ม Capacity — ตรวจสอบ Pol in Bagasse หากสูง >2% อาจต้องเพิ่ม Imbibition Water หรือลดความเร็วรอบลูกหีบเพื่อเพิ่ม Extraction');
    }
  }

  // Total Loss + Recovery Analysis
  if(tl>20&&ccsR>0&&ccsR<85){
    rootCauses.push('⚗️ <b>Total Loss สูง '+f2(tl)+'% + Recovery ต่ำ '+f2(ccsR)+'%:</b><br>Mass Balance ชี้ว่ามีการสูญเสียน้ำตาลในหลายจุด:<br>'+
    '(1) <b>Loss in Bagasse</b>: ตรวจ Pol in Bagasse — หากสูงกว่า 2% → ลูกหีบบีบอัดไม่ดีหรือ Imbibition ไม่พอ<br>'+
    '(2) <b>Loss in Final Molasses</b>: ตรวจ Purity of Final Molasses — หากสูงกว่า 33% → Boiling Scheme ไม่ดี, Crystallization ไม่หมดจด<br>'+
    '(3) <b>Undetermined Loss</b>: เกิดจาก Sucrose Inversion ในหม้อระเหย (pH ต่ำ+อุณหภูมิสูง), การรั่วไหล, หรือ Microbial Degradation');
    tips.push('💡 <b>ตรวจสอบ Purity Drop</b> ระหว่าง Mixed Juice → Clear Juice → Syrup — หากตกมากในช่วงหม้อระเหย แสดงว่าเกิด Inversion ต้องเพิ่มการควบคุม pH');
  }

  // Steam Analysis
  if(steam>500){
    let steamIssue='💨 <b>Steam Consumption สูง '+f2(steam)+' Kg/TC (เป้า 450):</b><br>';
    if(me<90) steamIssue+='M.E. ต่ำ '+f2(me)+'% → เกิด Idle Load ขณะหยุดเครื่อง (Energy Balance: ใช้ Steam คงที่แม้ไม่หีบ → Steam/TC พุ่ง)<br>';
    if(ct<CAP*0.7) steamIssue+='Throughput ต่ำ '+fI(ct)+' ตัน → Fixed Heat Loss ถูกหารด้วยอ้อยน้อย ทำให้ Specific Steam สูง<br>';
    steamIssue+='ตรวจสอบเพิ่มเติม: (1) ตะกรันหม้อระเหย (วัด Approach Temp ของ Juice Heater) (2) Vapor Bleeding จาก Effect ที่ 1-2 เหมาะสมหรือไม่ (3) Steam Trap ทำงานปกติหรือไม่ (4) Condensate กลับ Boiler ได้ครบหรือไม่';
    rootCauses.push(steamIssue);
    tips.push('💡 <b>Thermal Economy</b>: ตรวจสอบ Brix ของ Syrup ออกจากหม้อระเหย — หาก <65°Bx แสดงว่าหม้อระเหยทำงานไม่เต็มที่ อาจมี Scaling');
  }
  if(steam>450&&steam<=500&&ct>=CAP*0.85){
    tips.push('💡 Steam ใกล้เป้า — ปรับ Vapor Bleeding ดึงไอจาก V1/V2 ไปใช้ใน Pan และ Juice Heater แทนใช้ Exhaust Steam โดยตรง จะช่วยลด Steam ลงได้');
  }

  // ME + Stoppage
  if(me>0&&me<90&&totalStopHr>2){
    rootCauses.push('⚙️ <b>M.E. ต่ำ '+f2(me)+'% (หยุด '+f2(totalStopHr)+' ชม.):</b><br>'+
    'การหยุด-เดินซ้ำส่งผลเสียหลายด้าน:<br>'+
    '(1) Steam Balance: ทุกครั้งที่เริ่มเดินใหม่ต้อง Warm-up หม้อระเหยและ Juice Heater → สิ้นเปลือง Steam<br>'+
    '(2) Sucrose Loss: อ้อยรอหีบนานขึ้น → Microbial Activity สูง → Dextran เพิ่ม → Inversion เพิ่ม<br>'+
    '(3) น้ำอ้อยค้างในระบบ → pH ลด → Sucrose Degradation ในหม้อระเหย');

function doSendAndUpdate(dailyData,stopData,status,btn){
  var dateStr=dailyData.d;
  if(!dateStr||dateStr.length<10){status.className='upload-status err';status.textContent='❌ วันที่ไม่ถูกต้อง: '+dateStr;btn.disabled=false;return}
  // Check duplicate
  var exists=D.some(function(r){return r.d===dateStr});
  if(exists&&!confirm('⚠️ พบข้อมูลวันที่ '+dateStr+' อยู่แล้ว\nต้องการบันทึกทับ?')){
    status.className='upload-status err';status.textContent='❌ ยกเลิก';btn.disabled=false;return;
  }
  status.className='upload-status loading';status.textContent='⏳ กำลังบันทึก...';
  // Send to Google Sheet (fire and forget)
  var payload={action:stopData?'save_both':'save_daily',daily:dailyData};
  if(stopData)payload.stoptime=stopData;
  fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload),mode:'no-cors'}).catch(function(){});

  var dIdx=-1;for(var i=0;i<D.length;i++){if(D[i].d===dateStr){dIdx=i;break}}

  D_2526.length=0;for(var i=0;i<D.length;i++)D_2526.push(D[i]);
  if(stopData){
    var sIdx=-1;for(var i=0;i<ST.length;i++){if(ST[i].d===stopData.d){sIdx=i;break}}
    if(sIdx>=0)ST.splice(sIdx,1,stopData);else{ST.push(stopData);ST.sort(function(a,b){return(a.d||'').localeCompare(b.d||'')})}
    ST_2526.length=0;for(var i=0;i<ST.length;i++)ST_2526.push(ST[i]);
  }
  // Save to localStorage for persistence
  try{localStorage.setItem('ml_D_2526',JSON.stringify(D));localStorage.setItem('ml_ST_2526',JSON.stringify(ST))}catch(e){}
  // Rebuild dropdown + render
  LAST_UPDATE=D[D.length-1].d;

  if(sel){sel.innerHTML='';D.forEach(function(r,i){var o=document.createElement('option');o.value=i;o.textContent=r.d+'  —  วันหีบที่ '+(r.rn||i+1);sel.appendChild(o)});ix=D.length-1;sel.value=ix}
  render();
  status.className='upload-status ok';
  status.textContent='✅ บันทึกสำเร็จ! '+dateStr+(exists?' (ทับเดิม)':' (เพิ่มใหม่)')+' — '+D.length+' วัน';

  document.getElementById('fileStop').value='';
}

let sortDir='desc',sortDateDir='asc';
function sortCauseDate(){
  const tbl=document.getElementById('causeTable');if(!tbl)return;
  const rows=[...tbl.querySelectorAll('tbody tr')];
  sortDateDir=sortDateDir==='asc'?'desc':'asc';
  rows.sort((a,b)=>{
    const aD=a.getAttribute('data-date')||'';
    const bD=b.getAttribute('data-date')||'';
    return sortDateDir==='asc'?aD.localeCompare(bD):bD.localeCompare(aD);
  });
  const tbody=tbl.querySelector('tbody');
  rows.forEach(r=>tbody.appendChild(r));
}
function sortCause(){
  const tbl=document.getElementById('causeTable');if(!tbl)return;
  const rows=[...tbl.querySelectorAll('tbody tr')];
  sortDir=sortDir==='desc'?'asc':'desc';
  rows.sort((a,b)=>{
    const aMin=parseInt(a.querySelector('td:nth-child(3)')?.textContent)||0;
    const bMin=parseInt(b.querySelector('td:nth-child(3)')?.textContent)||0;
    return sortDir==='desc'?bMin-aMin:aMin-bMin;
  });
  const tbody=tbl.querySelector('tbody');
  rows.forEach(r=>tbody.appendChild(r));
}
function filterCause(){
  const fd=document.getElementById('fltDate')?document.getElementById('fltDate').value:'';
  const fp=document.getElementById('fltDept')?document.getElementById('fltDept').value:'';
  const tbl=document.getElementById('causeTable');
  if(!tbl)return;
  const rows=tbl.querySelectorAll('tbody tr');
  rows.forEach(r=>{
    const rd=r.getAttribute('data-date')||'';
    const rp=r.getAttribute('data-dept')||'';
    const showD=!fd||rd===fd;
    const showP=!fp||rp===fp;
    r.style.display=(showD&&showP)?'':'none';
  });
}
